[build]
command = "npm --prefix frontend run build"
publish = "frontend/dist"
functions = "netlify/functions"

[build.environment]
SERVERLESS_RUNTIME = "true"

[functions]
included_files = ["api/**", "config/**"]

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api/api/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
