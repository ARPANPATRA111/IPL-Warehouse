name: Warehouse Refresh

on:
  workflow_dispatch:
    inputs:
      full_refresh:
        description: Rebuild the schema and reload every tracked source file
        required: false
        default: false
        type: boolean
      log_level:
        description: Application log level for the ETL run
        required: false
        default: INFO
        type: choice
        options:
          - INFO
          - DEBUG
          - WARNING
          - ERROR
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: warehouse-refresh
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"
  LOG_LEVEL: ${{ github.event.inputs.log_level || 'INFO' }}
  ETL_VERSION: github-actions

jobs:
  refresh-warehouse:
    name: Incremental Warehouse Refresh
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate warehouse connection
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is required for warehouse refreshes."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ETL dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine refresh cadence
        id: cadence
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'PY'
          import os
          from datetime import datetime, timezone
          from sqlalchemy import create_engine, text
          from sqlalchemy.exc import SQLAlchemyError

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          if event_name == "workflow_dispatch":
            with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write("should_run_etl=true\n")
              output.write("refresh_cadence=manual\n")
              output.write("refresh_reason=Manual dispatch always runs the ETL.\n")
            raise SystemExit(0)

          rows = []
          history_error = None
          engine = create_engine(os.environ["DATABASE_URL"])
          try:
            with engine.connect() as connection:
              rows = connection.execute(
                text(
                  """
                  SELECT completed_at, COALESCE(files_processed, 0) AS files_processed
                  FROM etl_run_log
                  WHERE status = 'success' AND completed_at IS NOT NULL
                  ORDER BY completed_at DESC
                  LIMIT 90
                  """
                )
              ).mappings().all()
          except SQLAlchemyError as error:
            history_error = str(error)

          now = datetime.now(timezone.utc)
          last_success_at = rows[0]["completed_at"] if rows else None
          last_changed_at = next(
            (row["completed_at"] for row in rows if (row["files_processed"] or 0) > 0),
            None,
          )

          def normalize(value):
            if value is None:
              return None
            if value.tzinfo is None:
              return value.replace(tzinfo=timezone.utc)
            return value.astimezone(timezone.utc)

          last_success_at = normalize(last_success_at)
          last_changed_at = normalize(last_changed_at)

          should_run = True
          cadence = "bootstrap"
          reason = "No successful ETL history found; running a refresh check."

          if history_error:
            reason = f"Could not inspect ETL history ({history_error}); running a bootstrap refresh check."

          if not history_error and last_success_at and last_changed_at:
            days_since_success = (now - last_success_at).days
            days_since_change = (now - last_changed_at).days

            if days_since_change < 5:
              cadence = "daily"
              should_run = True
              reason = f"Recent source changes were loaded {days_since_change} day(s) ago; staying on daily refresh checks."
            elif days_since_change < 30:
              cadence = "every-5-days"
              should_run = days_since_success >= 5
              reason = (
                f"No new files have landed for {days_since_change} day(s); running every 5 days until the feed changes again."
              )
            else:
              cadence = "monthly"
              should_run = days_since_success >= 30
              reason = (
                f"No new files have landed for {days_since_change} day(s); switching to monthly season-start checks."
              )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
            output.write(f"should_run_etl={'true' if should_run else 'false'}\n")
            output.write(f"refresh_cadence={cadence}\n")
            output.write(f"refresh_reason={reason}\n")
          PY

      - name: Report skipped refresh
        if: steps.cadence.outputs.should_run_etl != 'true'
        run: |
          echo "Skipping warehouse refresh."
          echo "Cadence: ${{ steps.cadence.outputs.refresh_cadence }}"
          echo "Reason: ${{ steps.cadence.outputs.refresh_reason }}"

      - name: Run incremental ETL
        if: steps.cadence.outputs.should_run_etl == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          extra_args=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.full_refresh }}" = "true" ]; then
            extra_args=" --full-refresh"
          fi
          python -m etl.pipeline${extra_args}

      - name: Verify core warehouse tables
        if: steps.cadence.outputs.should_run_etl == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'PY'
          import os
          from sqlalchemy import create_engine, text

          engine = create_engine(os.environ["DATABASE_URL"])
          tables = ["fact_match_summary", "fact_deliveries"]
          with engine.connect() as connection:
              counts = {
                  table: connection.execute(text(f"select count(*) from {table}")).scalar()
                  for table in tables
              }

          print(counts)
          if any((count or 0) == 0 for count in counts.values()):
              raise SystemExit("Warehouse refresh finished but one or more core tables are empty.")
          PY
